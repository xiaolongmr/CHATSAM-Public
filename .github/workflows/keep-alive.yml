name: Keep HuggingFace Space Alive  # 工作流名称

on:
  schedule:
    - cron: '0 */12 * * *'  # 每12小时执行一次
  workflow_dispatch:         # 支持手动触发

jobs:
  keep-alive:
    runs-on: ubuntu-latest  # 运行环境
    steps:
      - name: Ping HuggingFace Space  # 步骤名称
        run: |
          # ⚠️ 请修改为你的 Space 地址
          curl -s https://huggingface.co/spaces/zlcy/CHATSAM-Public
          curl -s https://zlcy-CHATSAM-Public.hf.space
      - name: Log status  # 记录日志
        run: echo "Keep-alive ping sent at $(date)"
